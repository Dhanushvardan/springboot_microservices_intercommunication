spring.application.name=apigateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

    
spring.cloud.gateway.server.webflux.routes[0].id=mstesting
spring.cloud.gateway.server.webflux.routes[0].uri=lb://MSTESTING
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/mstesting/**


spring.cloud.gateway.server.webflux.routes[1].id=second
spring.cloud.gateway.server.webflux.routes[1].uri=lb://SECOND
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/second/**